    #episodes: 300

  # --- DQN ---
  - name: "DQN_quick"
    algorithm: "DQN"
    enabled: true
    progress_bar: false
    skip_learn: false
    show_action: false
    load: false
    load_dir:  
    save: true
    state_input_mode : "normalized" # "raw" or "normalized" (normalized is the default and recommended for DQN and PPO)
    net_arch: [8, 8]
    learning_rate: 0.005
    gamma: 0.3
    exploration_fraction: 0.1
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.1
    buffer_size: 5000
    batch_size: 16
    target_update_interval: 80
    learning_starts: 20
    #episodes: 300

