    show_action: false
    load: false
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/PPO_slow/PPO_slow"
    save: true
    state_input_mode : "normalized"
    net_arch: [8, 8]
    learning_rate: 0.0003
    gamma: 0.95
    ent_coef: 0.01
    n_steps: 40
    batch_size: 1
    #episodes: 300

  - name: "PPO_balanced"
    algorithm: "PPO"
    enabled: false
