    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/A2C_quick/A2C_quick"
    save: true
    state_input_mode : "normalized"
    net_arch: [8, 8]
    learning_rate: 0.005
