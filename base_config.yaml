#the default configuration file loaded is in config/default.yaml
training_directory: _training
enable_web_interface: True
server_user: mininet-gym
log_level: info  #info, #debug
random_seed: 77
env_params:
  gym_type: attacks_ho #_from_dataset #How to read traffic: [classification_from_dataset, classification_with_syncronize, classification_without_syncronize, real_time, attacks, attacks_from_dataset, attacks_ho, attacks_ho_from_dataset, marl_attacks, marl_attacks_from_dataset].
  #agent_execution_mode: "sequential"  # "parallel" (default, normal behavior) or "sequential" (an agent acts after the other, useful for debugging and to understand the environment behavior)
  #classification
  #csv_file: traffic.csv #necessary only if gym_type: classification_from_dataset and for agent supervised
  show_normal_traffic: True
  print_training_chart: True
  must_check_env: False
  n_bins: 4  
  steps_min_percentage: 0.9
  accuracy_min: 0.9 #to return done during train related to steps_min_percentage
  episodes: 30  #Number of episodes to train the agent
  max_steps: 120  #Max number of steps per episode
  test_episodes: 180 #Number of episodes to test the agent
  wait_after_read: 1  

  #scenario parameters
  #from the corrispondent scenario_en_params.yaml

  #network environment
  net_params:
    start_cli: False
    traffic_types: ["none", "ping",  "udp" , "tcp"] #labels normal traffic generator
    num_hosts: 5
    num_switches: 1
    num_iots: 5
    controller:
      ip: 192.168.1.x #226 on ubuntu
      port: 6633
      usr: xxx
      pwd: xxx
# === Agents Configuration ===
agents:
  - name: "Supervised_1"
    algorithm: "Supervised"
    enabled: false

  # --- Q-learning ---
  - name: "Q-learning_quick"
    algorithm: "Q-learning"
    enabled: true
    skip_learn: false
    show_action: false
    load: False
    load_dir: "marl_attacks/20251123-081513_1_5_5/Q-learning_quick/"
    save: true
    learning_rate: 0.2
    discount_factor: 0.3
    exploration_rate: 1.0
    exploration_decay: 0.995
    #episodes: None   #if null or None it takes from env_params

  - name: "Q-learning_slow"
    algorithm: "Q-learning"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Q-learning_slow/Q-learning_slow"
    save: true
    learning_rate: 0.01
    discount_factor: 0.9
    exploration_rate: 1.0
    exploration_decay: 0.9995
    #episodes: 300

  - name: "Q-learning_balanced"
    algorithm: "Q-learning"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Q-learning_balanced/Q-learning_balanced"
    save: true
    learning_rate: 0.05
    discount_factor: 0.5
    exploration_rate: 1.0
    exploration_decay: 0.999
    #episodes: 300

  # --- SARSA ---
  - name: "Sarsa_quick"
    algorithm: "SARSA"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Sarsa_quick/Sarsa_quick"
    save: true
    learning_rate: 0.2
    discount_factor: 0.3
    exploration_rate: 1.0
    exploration_decay: 0.995
    #episodes: 300

  - name: "Sarsa_slow"
    algorithm: "SARSA"
    enabled: true
    skip_learn: false
    show_action: false
    load: false
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Sarsa_slow/Sarsa_slow"
    save: true
    learning_rate: 0.01
    discount_factor: 0.9
    exploration_rate: 1.0
    exploration_decay: 0.9995
    #episodes: 300

  - name: "Sarsa_balanced"
    algorithm: "SARSA"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir:  
    save: true
    learning_rate: 0.05
    discount_factor: 0.5
    exploration_rate: 1.0
    exploration_decay: 0.999
    #episodes: 300

  # --- DQN ---
  - name: "DQN_quick"
    algorithm: "DQN"
    enabled: true
    progress_bar: false
    skip_learn: false
    show_action: false
    load: false
    load_dir:  
    save: true
    state_input_mode : "normalized" # "raw" or "normalized" (normalized is the default and recommended for DQN and PPO)
    net_arch: [8, 8]
    learning_rate: 0.005
    gamma: 0.3
    exploration_fraction: 0.1
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.1
    buffer_size: 5000
    batch_size: 16
    target_update_interval: 80
    learning_starts: 20
    #episodes: 300

  - name: "DQN_slow"
    algorithm: "DQN"
    enabled: false
    progress_bar: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/DQN_slow/DQN_slow"
    save: true
    state_input_mode : "normalized" # "raw" or "normalized" (normalized is the default and recommended for DQN and PPO)
    net_arch: [8, 8]
    learning_rate: 0.0003
    gamma: 0.95
    exploration_fraction: 0.3
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.05
    buffer_size: 20000
    batch_size: 16
    target_update_interval: 80
    learning_starts: 20
    #episodes: 300

  - name: "DQN_balanced"
    algorithm: "DQN"
    enabled: false
    progress_bar: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/DQN_balanced/DQN_balanced"
    save: true
    state_input_mode : "normalized" # "raw" or "normalized" (normalized is the default and recommended for DQN and PPO)
    net_arch: [8, 8]
    learning_rate: 0.001
    gamma: 0.9
    exploration_fraction: 0.2
    exploration_initial_eps: 1.0
    exploration_final_eps: 0.05
    buffer_size: 10000
    batch_size: 16
    target_update_interval: 80
    learning_starts: 20
    #episodes: 300

  # --- PPO ---
  - name: "PPO_quick"
    algorithm: "PPO"
    enabled: false
    progress_bar: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/PPO_quick/PPO_quick"
    save: true
    state_input_mode : "normalized" # "raw" or "normalized" (normalized is the default and recommended for DQN and PPO)
    net_arch: [8, 8]
    learning_rate: 0.005
    gamma: 0.3
    ent_coef: 0.1
    n_steps: 20
    batch_size: 1
    #episodes: 300

  - name: "PPO_slow"
