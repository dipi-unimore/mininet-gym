#the default configuration file loaded is in config/default.yaml
training_directory: _training
enable_web_interface: True
server_user: mininet-gym
log_level: info  #info, #debug
random_seed: 77
env_params:
  gym_type: attacks_ho #_from_dataset #How to read traffic: [classification_from_dataset, classification_with_syncronize, classification_without_syncronize, real_time, attacks, attacks_from_dataset, attacks_ho, attacks_ho_from_dataset, marl_attacks, marl_attacks_from_dataset].
  #agent_execution_mode: "sequential"  # "parallel" (default, normal behavior) or "sequential" (an agent acts after the other, useful for debugging and to understand the environment behavior)
  #classification
  #csv_file: traffic.csv #necessary only if gym_type: classification_from_dataset and for agent supervised
  show_normal_traffic: True
  print_training_chart: True
  must_check_env: False
  n_bins: 4  
  steps_min_percentage: 0.9
  accuracy_min: 0.9 #to return done during train related to steps_min_percentage
  episodes: 30  #Number of episodes to train the agent
  max_steps: 120  #Max number of steps per episode
  test_episodes: 180 #Number of episodes to test the agent
  wait_after_read: 1  
  #attack environment
  attacks:
    likely: 0.35 #likelihood that one host attacks (0-max_attack_percentage). necessary only with gym_type=attacks
    likely_train: 0.9 #(For ATTACKS_HO only) likelihood of attack during training episodes. Range: 0.0-1.0 (default 0.9). High value = frequent attacks during training for agent learning
    likely_eval: 0.3 #(For ATTACKS_HO only) likelihood of attack during evaluation/test episodes. Range: 0.0-1.0 (default 0.3). Lower value = sparse attacks for realistic testing
    max_attack_percentage: 0.9 #max probability cap for attack_likely (range 0.0-1.0, default 0.5). Set to 0.9 for 90% attack frequency
    # NOTE: For ATTACKS_HO (per-host scenario), these timings control attack distribution:
    # - short_attack_duration: steps that a SHORT_ATTACK lasts (default 5)
    # - long_attack_duration: steps that a LONG_ATTACK lasts (default 30)
    # - no_attack_timeout: delay (steps) between any two attacks on a host (default 15)
    # Reduce timeouts to increase attack frequency; adjust durations for more/less sustained attacks
    short_attack_duration: 5  # null = use default (5). Range: 2-10 for short spikes
    long_attack_duration: 25   # null = use default (30). Range: 10-60 for sustained attacks
    no_attack_timeout: 5      # null = use default (15). Range: 5-30 to control attack density
    # Link unblock policy (ATTACKS_HO):
    # - unblock_min_hold_rounds: minimum full rounds to keep link blocked
    # - unblock_required_normal_streak: consecutive NORMAL decisions required while blocked
    unblock_min_hold_rounds: 2
    unblock_required_normal_streak: 2
    thresholds:      
      packets: 22000 #200000 packets are an UDP an attack. This is multiply for number of hosts to obtain the high value of bins
      var_packets: 50 #percentage packet variation 
      bytes: 423000000 #4230000 # the bytes are not important to determinate an attack (only packets with hping3 --flood --udp) this is abnormal traffic. This is multiply for number of hosts to obtain the high value of bins
      var_bytes: 30 #percentage byte variation 
  classification:
    thresholds:
      packets: 200 
      bytes: 1000000
      var_packets: 100
      var_bytes: 100
  #network environment
  net_params:
    start_cli: False
    traffic_types: ["none", "ping",  "udp" , "tcp"] #labels normal traffic generator
    num_hosts: 5
    num_switches: 1
    num_iots: 5
    controller:
      ip: 192.168.1.x #226 on ubuntu
      port: 6633
      usr: xxx
      pwd: xxx
# === Agents Configuration ===
agents:
  - name: "Supervised_1"
    algorithm: "Supervised"
    enabled: false

  # --- Q-learning ---
  - name: "Q-learning_quick"
    algorithm: "Q-learning"
    enabled: true
    skip_learn: false
    show_action: false
    load: False
    load_dir: "marl_attacks/20251123-081513_1_5_5/Q-learning_quick/"
    save: true
    learning_rate: 0.2
    discount_factor: 0.3
    exploration_rate: 1.0
    exploration_decay: 0.995
    #episodes: None   #if null or None it takes from env_params

  - name: "Q-learning_slow"
    algorithm: "Q-learning"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Q-learning_slow/Q-learning_slow"
    save: true
    learning_rate: 0.01
    discount_factor: 0.9
    exploration_rate: 1.0
    exploration_decay: 0.9995
    #episodes: 300

  - name: "Q-learning_balanced"
    algorithm: "Q-learning"
    enabled: false
    skip_learn: true
    show_action: false
    load: true
    load_dir: "attacks_from_dataset/20250709-105720_1_10_1/Q-learning_balanced/Q-learning_balanced"
    save: true
    learning_rate: 0.05
    discount_factor: 0.5
    exploration_rate: 1.0
    exploration_decay: 0.999
    #episodes: 300

  # --- SARSA ---
